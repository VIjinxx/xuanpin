# ==================== Doris \u914D\u7F6E ====================
# FE\u8282\u70B9\u5730\u5740\uFF08HTTP\u7AEF\u53E3\uFF0C\u7528\u4E8EStream Load\uFF09
doris.fe.nodes=hdp01:8030
# \u6570\u636E\u5E93\u540D
doris.database=lingyun
# \u7528\u6237\u540D
doris.user=root
# \u5BC6\u7801
doris.password=root123
# Buffer\u914D\u7F6E\uFF08\u6027\u80FD\u4F18\u5316\uFF09
# buffer\u5927\u5C0F(KB)\uFF1A\u751F\u4EA7\u73AF\u5883\u5EFA\u8BAE 1024~5120\uFF0C\u6D4B\u8BD5\u73AF\u5883\u53EF\u8BBE\u7F6E 8~64
doris.buffer.size.kb=1024
# buffer\u6570\u91CF\uFF1A\u751F\u4EA7\u73AF\u5883\u5EFA\u8BAE 3~5
doris.buffer.count=3
# Stream Load\u4E25\u683C\u6A21\u5F0F\uFF1A\u751F\u4EA7\u9ED8\u8BA4\u5F00\u542F\uFF0C\u9047\u5230\u7C7B\u578B\u4E0D\u5339\u914D\u5E94\u5148\u4FEE\u590Dschema\u6216\u6620\u5C04
doris.strict.mode=true
doris.partial.columns=false
# \u5199\u5165\u8FDB\u5EA6\u65E5\u5FD7\u95F4\u9694\uFF1A1 \u8868\u793A\u6BCF\u6761\u8BB0\u5F55\u90FD\u76F4\u63A5\u6253\u5370
log.sample.interval=1

# ==================== Kafka ====================
bootstrapServers=hdp01:9092,hdp02:9092,hdp03:9092
topic=test
groupId=test
# \u6D88\u8D39\u4F4D\u7F6E: earliest(\u4ECE\u6700\u65E9\u5F00\u59CB) / latest(\u4ECE\u6700\u65B0\u5F00\u59CB)
kafka.offset.reset=latest

# ==================== Flink Checkpoint \u914D\u7F6E ====================
# checkpoint \u95F4\u9694\u65F6\u95F4(\u6BEB\u79D2)
flink.checkpoint.interval.ms=10000
# checkpoint \u8D85\u65F6\u65F6\u95F4(\u6BEB\u79D2)
flink.checkpoint.timeout.ms=30000
# \u4E24\u6B21 checkpoint \u4E4B\u95F4\u7684\u6700\u5C0F\u95F4\u9694(\u6BEB\u79D2)
flink.checkpoint.min.pause.ms=5000
# \u6700\u5927\u5E76\u53D1 checkpoint \u6570\u91CF
flink.checkpoint.max.concurrent=1
# \u5BB9\u5FCD checkpoint \u5931\u8D25\u6B21\u6570
flink.checkpoint.tolerable.failure.number=3
# checkpoint \u6A21\u5F0F: EXACTLY_ONCE / AT_LEAST_ONCE
flink.checkpoint.mode=EXACTLY_ONCE
